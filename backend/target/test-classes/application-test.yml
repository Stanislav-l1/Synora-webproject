spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: test-secret-key-at-least-256-bits-long-for-hmac-sha
  access-token-expiration: 900
  refresh-token-expiration: 604800

aws:
  s3:
    endpoint: http://localhost:9000
    bucket: synora-test
    access-key: minioadmin
    secret-key: minioadmin
    region: us-east-1

logging:
  level:
    com.synora: DEBUG
    org.springframework.security: DEBUG
